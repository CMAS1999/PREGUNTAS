<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Resultados Encuesta</title>

<style>
body{font-family:Arial;background:#f4f6f9;padding:30px;}
.contenedor{max-width:850px;margin:auto;background:white;padding:30px;border-radius:18px;box-shadow:0 0 20px #ccc;}
h1{text-align:center;color:#003b7a;}
.pregunta{margin-top:25px;padding:25px;border:2px solid #f28c28;border-radius:16px;}
.ganador{background:#fff3e6;padding:12px;border-radius:10px;margin-bottom:15px;font-weight:bold;color:#003b7a;}
.top-card{background:#f8fbff;border:1px solid #dcecff;border-radius:14px;padding:15px;margin:15px 0;}
.top-card h3{color:#003b7a;margin:0 0 8px;}
.votos{font-weight:bold;color:#f28c28;}
.barra{background:#ddd;border-radius:10px;overflow:hidden;margin-top:8px;}
.progreso{background:linear-gradient(90deg,#f28c28,#0078d4);color:white;padding:7px;font-size:13px;font-weight:bold;}
.total{margin-top:18px;font-weight:bold;color:#003b7a;}
</style>
</head>

<body>

<div class="contenedor">
  <h1>🏆 Resultados en Tiempo Real</h1>
  <div id="resultados"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAJnoku72zdNp4YpY5iMaNTRJXUb_GL2yk",
  authDomain: "preguntas-3fb08.firebaseapp.com",
  projectId: "preguntas-3fb08",
  storageBucket: "preguntas-3fb08.firebasestorage.app",
  messagingSenderId: "382488336682",
  appId: "1:382488336682:web:a3adf0980215c50398a653",
  measurementId: "G-99MYSVGX84"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const preguntas = [
  { id: "trabajador", texto: "¿Quién es el más trabajador?" },
  { id: "puntual", texto: "¿Quién es el más puntual?" },
  { id: "responsable", texto: "¿Quién es el más responsable?" }
];

let trabajadores = [];

onSnapshot(collection(db, "trabajadores"), (snapshot) => {
  trabajadores = [];

  snapshot.forEach(docSnap => {
    trabajadores.push(docSnap.data().nombre);
  });

  trabajadores.sort();
  cargarResultados();
});

function cargarResultados(){
  const contenedor = document.getElementById("resultados");
  contenedor.innerHTML = "";

  preguntas.forEach(pregunta => {
    const div = document.createElement("div");
    div.className = "pregunta";
    div.id = `pregunta-${pregunta.id}`;
    div.innerHTML = `<h2>${pregunta.texto}</h2><p>Cargando resultados...</p>`;
    contenedor.appendChild(div);

    escucharResultados(pregunta);
  });
}

function escucharResultados(pregunta){
  const preguntaRef = doc(db, "votos", pregunta.id);

  onSnapshot(preguntaRef, (docSnap) => {
    const data = docSnap.exists() ? docSnap.data() : {};

    let total = 0;

    trabajadores.forEach(nombre => {
      total += data[nombre] || 0;
    });

    let ranking = trabajadores.map(nombre => ({
      nombre: nombre,
      votos: data[nombre] || 0
    }));

    ranking.sort((a, b) => b.votos - a.votos);

    const top3 = ranking.slice(0, 3);

    let html = `<h2>${pregunta.texto}</h2>`;

    if(total > 0){
      html += `
        <div class="ganador">
          🏆 Ganador actual: ${top3[0].nombre} con ${top3[0].votos} votos
        </div>
      `;
    } else {
      html += `<div class="ganador">Aún no hay votos registrados.</div>`;
    }

    top3.forEach((item, index) => {
      const porcentaje = total > 0 ? Math.round((item.votos / total) * 100) : 0;

      let medalla = "🥇";
      let puesto = "Primer lugar";

      if(index === 1){
        medalla = "🥈";
        puesto = "Segundo lugar";
      }

      if(index === 2){
        medalla = "🥉";
        puesto = "Tercer lugar";
      }

      html += `
        <div class="top-card">
          <h3>${medalla} ${puesto}</h3>
          <div><b>${item.nombre}</b></div>
          <div class="votos">${item.votos} votos (${porcentaje}%)</div>
          <div class="barra">
            <div class="progreso" style="width:${porcentaje}%">
              ${porcentaje}%
            </div>
          </div>
        </div>
      `;
    });

    html += `<div class="total">Total de votos: ${total}</div>`;

    document.getElementById(`pregunta-${pregunta.id}`).innerHTML = html;
  });
}
</script>

</body>
</html>
