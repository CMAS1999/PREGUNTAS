<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro</title>
<style>
body{font-family:Arial;background:#f4f6f9;padding:30px;}
.contenedor{max-width:500px;margin:auto;background:white;padding:30px;border-radius:18px;box-shadow:0 0 20px #ccc;}
h1{text-align:center;color:#003b7a;}
input{width:100%;padding:12px;border:2px solid #0078d4;border-radius:8px;}
button{margin-top:15px;padding:12px 18px;background:#f28c28;color:white;border:none;border-radius:8px;cursor:pointer;}
.mensaje{margin-top:15px;font-weight:bold;}
</style>
</head>
<body>

<div class="contenedor">
  <h1>Registro de Trabajador</h1>
  <input type="text" id="nombre" placeholder="Escribe tu nombre completo">
  <button onclick="registrar()">Registrarme y votar</button>
  <div id="mensaje" class="mensaje"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAJnoku72zdNp4YpY5iMaNTRJXUb_GL2yk",
  authDomain: "preguntas-3fb08.firebaseapp.com",
  projectId: "preguntas-3fb08",
  storageBucket: "preguntas-3fb08.firebasestorage.app",
  messagingSenderId: "382488336682",
  appId: "1:382488336682:web:a3adf0980215c50398a653",
  measurementId: "G-99MYSVGX84"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function limpiarTexto(texto){
  return texto.trim().toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/\s+/g,"_")
    .replace(/[^a-z0-9_]/g,"");
}

window.registrar = async function(){
  const nombre = document.getElementById("nombre").value.trim();
  const mensaje = document.getElementById("mensaje");

  if(nombre === ""){
    mensaje.innerHTML = "⚠️ Escribe tu nombre.";
    return;
  }

  const id = limpiarTexto(nombre);
  const refTrabajador = doc(db, "trabajadores", id);
  const existe = await getDoc(refTrabajador);

  if(!existe.exists()){
    await setDoc(refTrabajador, {
      nombre: nombre,
      fecha: new Date().toISOString()
    });
  }

  localStorage.setItem("votanteNombre", nombre);
  localStorage.setItem("votanteId", id);

  window.location.href = "votar.html";
};
</script>

</body>
</html>
