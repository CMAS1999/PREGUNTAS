<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Encuesta Laboral</title>
<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f6f9;
  margin:0;
  padding:30px;
}
.contenedor{
  max-width:750px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 0 15px rgba(0,0,0,0.1);
}
h1{text-align:center;}
.pregunta{
  margin-top:25px;
  padding:20px;
  border:1px solid #ddd;
  border-radius:12px;
}
.opcion{
  display:block;
  margin:10px 0;
}
button{
  margin-top:15px;
  padding:10px 18px;
  background:#0078d4;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.resultados{
  margin-top:15px;
  background:#f1f1f1;
  padding:12px;
  border-radius:8px;
}
.barra{
  background:#ddd;
  border-radius:8px;
  overflow:hidden;
  margin:5px 0 12px;
}
.progreso{
  background:#0078d4;
  color:white;
  padding:5px;
  width:0%;
  font-size:13px;
}
</style>
</head>

<body>

<div class="contenedor">
  <h1>Encuesta Laboral</h1>
  <div id="encuestas"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  doc,
  onSnapshot,
  runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* TU CONFIGURACIÓN DE FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyAJnoku72zdNp4YpY5iMaNTRJXUb_GL2yk",
  authDomain: "preguntas-3fb08.firebaseapp.com",
  projectId: "preguntas-3fb08",
  storageBucket: "preguntas-3fb08.firebasestorage.app",
  messagingSenderId: "382488336682",
  appId: "1:382488336682:web:a3adf0980215c50398a653",
  measurementId: "G-99MYSVGX84"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* AQUÍ EDITAS TUS PREGUNTAS Y NOMBRES */
const preguntas = [
  {
    id: "trabajador",
    texto: "¿Quién es el más trabajador?",
    opciones: [
      "Juan Pérez",
      "María López",
      "Carlos Torres",
      "Ana Rojas"
    ]
  },
  {
    id: "puntual",
    texto: "¿Quién es el más puntual?",
    opciones: [
      "Juan Pérez",
      "María López",
      "Carlos Torres",
      "Ana Rojas"
    ]
  }
];

const contenedor = document.getElementById("encuestas");

preguntas.forEach(pregunta => {
  const div = document.createElement("div");
  div.className = "pregunta";

  div.innerHTML = `
    <h2>${pregunta.texto}</h2>

    ${pregunta.opciones.map(nombre => `
      <label class="opcion">
        <input type="radio" name="${pregunta.id}" value="${nombre}">
        ${nombre}
      </label>
    `).join("")}

    <button onclick="votar('${pregunta.id}')">Votar</button>

    <div class="resultados" id="resultados-${pregunta.id}">
      Cargando resultados...
    </div>
  `;

  contenedor.appendChild(div);
  escucharResultados(pregunta);
});

window.votar = async function(idPregunta){
  const seleccionado = document.querySelector(`input[name="${idPregunta}"]:checked`);

  if(!seleccionado){
    alert("Selecciona una opción.");
    return;
  }

  const nombre = seleccionado.value;
  const preguntaRef = doc(db, "votos", idPregunta);

  await runTransaction(db, async (transaction) => {
    const docSnap = await transaction.get(preguntaRef);

    let datos = {};

    if(docSnap.exists()){
      datos = docSnap.data();
    }

    const votosActuales = datos[nombre] || 0;
    datos[nombre] = votosActuales + 1;

    transaction.set(preguntaRef, datos);
  });

  alert("Voto registrado correctamente.");
};

function escucharResultados(pregunta){
  const preguntaRef = doc(db, "votos", pregunta.id);

  onSnapshot(preguntaRef, (docSnap) => {
    const data = docSnap.exists() ? docSnap.data() : {};
    const divResultados = document.getElementById(`resultados-${pregunta.id}`);

    let total = 0;

    pregunta.opciones.forEach(nombre => {
      total += data[nombre] || 0;
    });

    let html = "<b>Resultados en tiempo real:</b><br><br>";

    pregunta.opciones.forEach(nombre => {
      const votos = data[nombre] || 0;
      const porcentaje = total > 0 ? Math.round((votos / total) * 100) : 0;

      html += `
        <b>${nombre}</b>: ${votos} votos (${porcentaje}%)
        <div class="barra">
          <div class="progreso" style="width:${porcentaje}%">
            ${porcentaje}%
          </div>
        </div>
      `;
    });

    html += `<b>Total de votos:</b> ${total}`;

    divResultados.innerHTML = html;
  });
}
</script>

</body>
</html>
