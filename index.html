<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Encuesta Laboral</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f6f9;
  margin:0;
  padding:30px;
}

.contenedor{
  max-width:750px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:18px;
  box-shadow:0 0 20px rgba(0,0,0,0.12);
}

h1{
  text-align:center;
  color:#003b7a;
}

.login{
  text-align:center;
  margin-top:20px;
}

input[type="text"]{
  width:90%;
  padding:12px;
  border:2px solid #0078d4;
  border-radius:10px;
  font-size:16px;
}

.lista{
  margin-top:15px;
}

.item{
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  background:#f1f7ff;
  cursor:pointer;
  border:1px solid #cfe5ff;
}

.item:hover{
  background:#ffe8d1;
}

.pregunta{
  margin-top:25px;
  padding:20px;
  border:2px solid #f28c28;
  border-radius:14px;
}

.opcion{
  display:block;
  margin:10px 0;
}

button{
  margin-top:15px;
  padding:10px 18px;
  background:#0078d4;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#005fa3;
}

.mensaje{
  margin-top:15px;
  font-weight:bold;
  color:green;
}

.oculto{
  display:none;
}

.usuario{
  background:#fff3e6;
  padding:12px;
  border-radius:10px;
  color:#003b7a;
  font-weight:bold;
  border-left:6px solid #f28c28;
}
</style>
</head>

<body>

<div class="contenedor">
  <h1>Encuesta Laboral</h1>

  <div id="login" class="login">
    <h2>Busca tu nombre para votar</h2>
    <input type="text" id="buscador" placeholder="Escribe tu nombre...">
    <div id="listaNombres" class="lista"></div>
  </div>

  <div id="zonaEncuesta" class="oculto">
    <div class="usuario" id="usuarioSeleccionado"></div>
    <div id="encuestas"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  doc,
  runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAJnoku72zdNp4YpY5iMaNTRJXUb_GL2yk",
  authDomain: "preguntas-3fb08.firebaseapp.com",
  projectId: "preguntas-3fb08",
  storageBucket: "preguntas-3fb08.firebasestorage.app",
  messagingSenderId: "382488336682",
  appId: "1:382488336682:web:a3adf0980215c50398a653",
  measurementId: "G-99MYSVGX84"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* AQUÍ COLOCAS LOS TRABAJADORES */
const trabajadores = [
  "Juan Pérez",
  "María López",
  "Carlos Torres",
  "Ana Rojas"
];

/* AQUÍ COLOCAS LAS PREGUNTAS */
const preguntas = [
  {
    id: "trabajador",
    texto: "¿Quién es el más trabajador?",
    opciones: trabajadores
  },
  {
    id: "puntual",
    texto: "¿Quién es el más puntual?",
    opciones: trabajadores
  }
];

let votanteActual = "";

const buscador = document.getElementById("buscador");
const listaNombres = document.getElementById("listaNombres");
const login = document.getElementById("login");
const zonaEncuesta = document.getElementById("zonaEncuesta");
const usuarioSeleccionado = document.getElementById("usuarioSeleccionado");
const contenedor = document.getElementById("encuestas");

buscador.addEventListener("input", () => {
  const texto = buscador.value.toLowerCase();
  listaNombres.innerHTML = "";

  if(texto.length < 1) return;

  const filtrados = trabajadores.filter(nombre =>
    nombre.toLowerCase().includes(texto)
  );

  filtrados.forEach(nombre => {
    const div = document.createElement("div");
    div.className = "item";
    div.textContent = nombre;
    div.onclick = () => seleccionarVotante(nombre);
    listaNombres.appendChild(div);
  });
});

function seleccionarVotante(nombre){
  votanteActual = nombre;

  login.classList.add("oculto");
  zonaEncuesta.classList.remove("oculto");

  usuarioSeleccionado.innerHTML = `Bienvenido/a: ${nombre}`;

  mostrarPreguntas();
}

function limpiarTexto(texto){
  return texto
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/\s+/g, "_")
    .replace(/[^a-z0-9_]/g, "");
}

function mostrarPreguntas(){
  contenedor.innerHTML = "";

  preguntas.forEach(pregunta => {
    const div = document.createElement("div");
    div.className = "pregunta";

    div.innerHTML = `
      <h2>${pregunta.texto}</h2>

      ${pregunta.opciones.map(nombre => {
        if(nombre === votanteActual) return "";

        return `
          <label class="opcion">
            <input type="radio" name="${pregunta.id}" value="${nombre}">
            ${nombre}
          </label>
        `;
      }).join("")}

      <button onclick="votar('${pregunta.id}')">Votar</button>

      <div class="mensaje" id="mensaje-${pregunta.id}"></div>
    `;

    contenedor.appendChild(div);
  });
}

window.votar = async function(idPregunta){
  const seleccionado = document.querySelector(`input[name="${idPregunta}"]:checked`);

  if(!seleccionado){
    alert("Selecciona una opción.");
    return;
  }

  const nombreVotado = seleccionado.value;
  const idVotante = limpiarTexto(votanteActual);

  const votoRef = doc(db, "votos", idPregunta);
  const controlRef = doc(db, "control_votos", `${idPregunta}_${idVotante}`);

  try{
    await runTransaction(db, async (transaction) => {
      const controlSnap = await transaction.get(controlRef);

      if(controlSnap.exists()){
        throw new Error("YA_VOTO");
      }

      const votoSnap = await transaction.get(votoRef);

      let datos = {};

      if(votoSnap.exists()){
        datos = votoSnap.data();
      }

      datos[nombreVotado] = (datos[nombreVotado] || 0) + 1;

      transaction.set(votoRef, datos);

      transaction.set(controlRef, {
        votante: votanteActual,
        voto: nombreVotado,
        pregunta: idPregunta,
        fecha: new Date().toISOString()
      });
    });

    document.getElementById(`mensaje-${idPregunta}`).innerHTML =
      "✅ Voto registrado correctamente.";

  }catch(error){
    if(error.message === "YA_VOTO"){
      document.getElementById(`mensaje-${idPregunta}`).innerHTML =
        "⚠️ Ya votaste en esta pregunta.";
    }else{
      alert("Error al registrar el voto.");
      console.error(error);
    }
  }
};
</script>

</body>
</html>
