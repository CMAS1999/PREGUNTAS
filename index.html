<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Encuesta Laboral</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f6f9;
  margin:0;
  padding:30px;
}

.contenedor{
  max-width:750px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
  text-align:center;
}

.pregunta{
  margin-top:25px;
  padding:20px;
  border:1px solid #ddd;
  border-radius:12px;
}

.opcion{
  display:block;
  margin:10px 0;
}

button{
  margin-top:15px;
  padding:10px 18px;
  background:#0078d4;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#005fa3;
}

.mensaje{
  margin-top:15px;
  font-weight:bold;
  color:green;
}
</style>
</head>

<body>

<div class="contenedor">
  <h1>Encuesta Laboral</h1>
  <div id="encuestas"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  doc,
  runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAJnoku72zdNp4YpY5iMaNTRJXUb_GL2yk",
  authDomain: "preguntas-3fb08.firebaseapp.com",
  projectId: "preguntas-3fb08",
  storageBucket: "preguntas-3fb08.firebasestorage.app",
  messagingSenderId: "382488336682",
  appId: "1:382488336682:web:a3adf0980215c50398a653",
  measurementId: "G-99MYSVGX84"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* AQUÍ EDITAS TUS PREGUNTAS Y NOMBRES */
const preguntas = [
  {
    id: "trabajador",
    texto: "¿Quién es el más trabajador?",
    opciones: [
      "Juan Pérez",
      "María López",
      "Carlos Torres",
      "Ana Rojas"
    ]
  },
  {
    id: "puntual",
    texto: "¿Quién es el más puntual?",
    opciones: [
      "Juan Pérez",
      "María López",
      "Carlos Torres",
      "Ana Rojas"
    ]
  }
];

const contenedor = document.getElementById("encuestas");

preguntas.forEach(pregunta => {
  const div = document.createElement("div");
  div.className = "pregunta";

  div.innerHTML = `
    <h2>${pregunta.texto}</h2>

    ${pregunta.opciones.map(nombre => `
      <label class="opcion">
        <input type="radio" name="${pregunta.id}" value="${nombre}">
        ${nombre}
      </label>
    `).join("")}

    <button onclick="votar('${pregunta.id}')">Votar</button>

    <div class="mensaje" id="mensaje-${pregunta.id}"></div>
  `;

  contenedor.appendChild(div);
});

window.votar = async function(idPregunta){
  const seleccionado = document.querySelector(`input[name="${idPregunta}"]:checked`);

  if(!seleccionado){
    alert("Selecciona una opción.");
    return;
  }

  const nombre = seleccionado.value;
  const preguntaRef = doc(db, "votos", idPregunta);

  await runTransaction(db, async (transaction) => {
    const docSnap = await transaction.get(preguntaRef);

    let datos = {};

    if(docSnap.exists()){
      datos = docSnap.data();
    }

    datos[nombre] = (datos[nombre] || 0) + 1;

    transaction.set(preguntaRef, datos);
  });

  document.getElementById(`mensaje-${idPregunta}`).innerHTML =
    "✅ Voto registrado correctamente.";
};
</script>

</body>
</html>
