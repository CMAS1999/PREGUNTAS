<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trivia</title>
<style>
*{box-sizing:border-box;}
body{font-family:Arial;background:#f4f6f9;padding:15px;margin:0;}
.contenedor{max-width:750px;margin:auto;background:white;padding:20px;border-radius:18px;box-shadow:0 0 20px #ccc;}
h1{text-align:center;color:#003b7a;}
.usuario{background:#fff3e6;padding:12px;border-left:6px solid #f28c28;border-radius:8px;font-weight:bold;color:#003b7a;}
.pregunta{margin-top:20px;padding:20px;border:2px solid #f28c28;border-radius:14px;}
.opcion{padding:10px;background:#f8fbff;border-radius:8px;margin:8px 0;}
button{margin-top:15px;padding:12px;background:#0078d4;color:white;border:none;border-radius:8px;cursor:pointer;width:100%;font-weight:bold;}
.ok{color:green;font-weight:bold;}
.error{color:red;font-weight:bold;}
</style>
</head>
<body>

<div class="contenedor">
<h1>Trivia</h1>
<div class="usuario" id="usuario"></div>
<div id="trivias"></div>
<button onclick="enviarRespuestas()">Enviar respuestas</button>
<div id="resultado"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAJnoku72zdNp4YpY5iMaNTRJXUb_GL2yk",
  authDomain: "preguntas-3fb08.firebaseapp.com",
  projectId: "preguntas-3fb08",
  storageBucket: "preguntas-3fb08.firebasestorage.app",
  messagingSenderId: "382488336682",
  appId: "1:382488336682:web:a3adf0980215c50398a653",
  measurementId: "G-99MYSVGX84"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const nombre = localStorage.getItem("votanteNombre");
const id = localStorage.getItem("votanteId");

if(!nombre || !id){
  window.location.href = "index.html";
}

document.getElementById("usuario").innerHTML = "Participante: " + nombre;

let trivias = [];
let respondidas = {};

onSnapshot(collection(db, "trivias"), async snapshot => {
  trivias = [];

  snapshot.forEach(docSnap => {
    trivias.push({
      id: docSnap.id,
      ...docSnap.data()
    });
  });

  await cargarRespondidas();
  mostrarTrivias();
});

async function cargarRespondidas(){
  respondidas = {};

  for(const trivia of trivias){
    const respuestaRef = doc(db, "respuestas_trivia", `${id}_${trivia.id}`);
    const respuestaSnap = await getDoc(respuestaRef);

    if(respuestaSnap.exists()){
      respondidas[trivia.id] = true;
    }
  }
}

function mostrarTrivias(){
  const contenedor = document.getElementById("trivias");
  contenedor.innerHTML = "";

  if(trivias.length === 0){
    contenedor.innerHTML = "<p>Aún no hay trivias registradas.</p>";
    return;
  }

  trivias.forEach((t, index) => {
    const yaRespondio = respondidas[t.id];

    contenedor.innerHTML += `
      <div class="pregunta">
        <h3>${index + 1}. ${t.pregunta}</h3>

        ${
          yaRespondio
          ? `<p class="ok">✅ Ya respondiste esta pregunta.</p>`
          : ["A","B","C","D"].map(letra => `
              <div class="opcion">
                <label>
                  <input type="radio" name="${t.id}" value="${letra}">
                  ${letra}) ${t.opciones[letra]}
                </label>
              </div>
            `).join("")
        }
      </div>
    `;
  });
}

window.enviarRespuestas = async function(){
  let nuevasRespondidas = 0;
  let correctas = 0;

  for(const t of trivias){
    if(respondidas[t.id]){
      continue;
    }

    const seleccionado = document.querySelector(`input[name="${t.id}"]:checked`);

    if(!seleccionado){
      continue;
    }

    const esCorrecta = seleccionado.value === t.correcta;

    if(esCorrecta){
      correctas++;
    }

    await setDoc(doc(db, "respuestas_trivia", `${id}_${t.id}`), {
      participanteId: id,
      nombre: nombre,
      triviaId: t.id,
      pregunta: t.pregunta,
      respuesta: seleccionado.value,
      correcta: t.correcta,
      acierto: esCorrecta ? 1 : 0,
      fecha: new Date().toISOString()
    });

    nuevasRespondidas++;
  }

  if(nuevasRespondidas === 0){
    document.getElementById("resultado").innerHTML =
      `<p class="error">⚠️ No seleccionaste ninguna pregunta nueva.</p>`;
    return;
  }

  document.getElementById("resultado").innerHTML =
    `<h2>Respondiste ${nuevasRespondidas} pregunta(s). Correctas: ${correctas}</h2>`;

  await cargarRespondidas();
  mostrarTrivias();
};
</script>

</body>
</html>
