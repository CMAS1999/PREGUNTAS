<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Agregar Preguntas</title>
<style>
body{font-family:Arial;background:#f4f6f9;padding:30px;}
.contenedor{max-width:650px;margin:auto;background:white;padding:30px;border-radius:18px;box-shadow:0 0 20px #ccc;}
h1{text-align:center;color:#003b7a;}
input{width:100%;padding:12px;border:2px solid #0078d4;border-radius:8px;margin-top:10px;}
button{margin-top:15px;padding:10px 18px;background:#f28c28;color:white;border:none;border-radius:8px;cursor:pointer;}
.lista{margin-top:20px;background:#f1f7ff;padding:15px;border-radius:10px;}
.item{padding:10px;border-bottom:1px solid #ddd;}

.boton-nav{
  text-decoration:none;
  background:#003b7a;
  color:white;
  padding:12px 20px;
  border-radius:10px;
  font-weight:bold;
  transition:0.3s;
  display:inline-block;
}

.boton-nav:hover{background:#f28c28;}

.zona-peligro{
  margin-top:25px;
  background:#fff0f0;
  border:2px solid #d40000;
  padding:15px;
  border-radius:12px;
}

.btn-rojo{
  background:#d40000;
  width:100%;
}

.btn-rojo:hover{
  background:#990000;
}
</style>
</head>
<body>

<div class="contenedor">
  <h1>Agregar Preguntas</h1>

  <div style="text-align:center; margin-bottom:20px;">
    <a href="resultados.html" class="boton-nav">
      🏆 Ver Resultados
    </a>
  </div>

  <input type="text" id="pregunta" placeholder="Escribe la pregunta">
  <button onclick="agregarPregunta()">Agregar pregunta</button>

  <div class="lista">
    <b>Preguntas registradas:</b>
    <div id="listaPreguntas"></div>
  </div>

  <div class="zona-peligro">
    <h3>Zona de limpieza</h3>

    <button class="btn-rojo" onclick="eliminarPreguntas()">
      🗑️ Eliminar todas las preguntas
    </button>

    <button class="btn-rojo" onclick="eliminarTrabajadores()">
      🗑️ Eliminar todos los trabajadores
    </button>

    <button class="btn-rojo" onclick="eliminarVotos()">
      🗑️ Reiniciar todos los votos
    </button>

    <button class="btn-rojo" onclick="eliminarTodo()">
      ⚠️ Eliminar TODO
    </button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  collection,
  onSnapshot,
  getDocs,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAJnoku72zdNp4YpY5iMaNTRJXUb_GL2yk",
  authDomain: "preguntas-3fb08.firebaseapp.com",
  projectId: "preguntas-3fb08",
  storageBucket: "preguntas-3fb08.firebasestorage.app",
  messagingSenderId: "382488336682",
  appId: "1:382488336682:web:a3adf0980215c50398a653",
  measurementId: "G-99MYSVGX84"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function limpiarTexto(texto){
  return texto.trim().toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/\s+/g,"_")
    .replace(/[^a-z0-9_]/g,"");
}

window.agregarPregunta = async function(){
  const input = document.getElementById("pregunta");
  const texto = input.value.trim();

  if(texto === ""){
    alert("Escribe una pregunta.");
    return;
  }

  const id = limpiarTexto(texto);
  const refPregunta = doc(db, "preguntas", id);
  const existe = await getDoc(refPregunta);

  if(existe.exists()){
    alert("Esa pregunta ya existe.");
    return;
  }

  await setDoc(refPregunta, {
    texto: texto,
    fecha: new Date().toISOString()
  });

  input.value = "";
  alert("Pregunta agregada correctamente.");
};

onSnapshot(collection(db, "preguntas"), (snapshot) => {
  let html = "";

  snapshot.forEach(docSnap => {
    html += `<div class="item">${docSnap.data().texto}</div>`;
  });

  document.getElementById("listaPreguntas").innerHTML =
    html || "<p>Aún no hay preguntas registradas.</p>";
});

async function borrarColeccion(nombreColeccion){
  const querySnapshot = await getDocs(collection(db, nombreColeccion));

  const promesas = [];

  querySnapshot.forEach((documento) => {
    promesas.push(deleteDoc(doc(db, nombreColeccion, documento.id)));
  });

  await Promise.all(promesas);
}

window.eliminarPreguntas = async function(){
  if(!confirm("¿Seguro que deseas eliminar TODAS las preguntas?")){
    return;
  }

  await borrarColeccion("preguntas");
  await borrarColeccion("votos");
  await borrarColeccion("control_votos");

  alert("Preguntas y votos eliminados.");
};

window.eliminarTrabajadores = async function(){
  if(!confirm("¿Seguro que deseas eliminar TODOS los trabajadores?")){
    return;
  }

  await borrarColeccion("trabajadores");
  await borrarColeccion("votos");
  await borrarColeccion("control_votos");

  alert("Trabajadores y votos eliminados.");
};

window.eliminarVotos = async function(){
  if(!confirm("¿Seguro que deseas reiniciar TODOS los votos?")){
    return;
  }

  await borrarColeccion("votos");
  await borrarColeccion("control_votos");

  alert("Votos reiniciados.");
};

window.eliminarTodo = async function(){
  if(!confirm("⚠️ Esto eliminará preguntas, trabajadores y votos. ¿Continuar?")){
    return;
  }

  await borrarColeccion("preguntas");
  await borrarColeccion("trabajadores");
  await borrarColeccion("votos");
  await borrarColeccion("control_votos");

  alert("Todo fue eliminado.");
};
</script>

</body>
</html>
