<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Agregar Preguntas</title>
<style>
body{font-family:Arial;background:#f4f6f9;padding:30px;}
.contenedor{max-width:650px;margin:auto;background:white;padding:30px;border-radius:18px;box-shadow:0 0 20px #ccc;}
h1{text-align:center;color:#003b7a;}
input{width:100%;padding:12px;border:2px solid #0078d4;border-radius:8px;margin-top:10px;}
button{margin-top:15px;padding:10px 18px;background:#f28c28;color:white;border:none;border-radius:8px;cursor:pointer;}
.lista{margin-top:20px;background:#f1f7ff;padding:15px;border-radius:10px;}
.item{padding:10px;border-bottom:1px solid #ddd;}
</style>
</head>
<body>

<div class="contenedor">
  <h1>Agregar Preguntas</h1>

  <input type="text" id="pregunta" placeholder="Escribe la pregunta">
  <button onclick="agregarPregunta()">Agregar pregunta</button>

  <div class="lista">
    <b>Preguntas registradas:</b>
    <div id="listaPreguntas"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, doc, setDoc, getDoc, collection, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAJnoku72zdNp4YpY5iMaNTRJXUb_GL2yk",
  authDomain: "preguntas-3fb08.firebaseapp.com",
  projectId: "preguntas-3fb08",
  storageBucket: "preguntas-3fb08.firebasestorage.app",
  messagingSenderId: "382488336682",
  appId: "1:382488336682:web:a3adf0980215c50398a653",
  measurementId: "G-99MYSVGX84"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function limpiarTexto(texto){
  return texto.trim().toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/\s+/g,"_")
    .replace(/[^a-z0-9_]/g,"");
}

window.agregarPregunta = async function(){
  const input = document.getElementById("pregunta");
  const texto = input.value.trim();

  if(texto === ""){
    alert("Escribe una pregunta.");
    return;
  }

  const id = limpiarTexto(texto);
  const refPregunta = doc(db, "preguntas", id);
  const existe = await getDoc(refPregunta);

  if(existe.exists()){
    alert("Esa pregunta ya existe.");
    return;
  }

  await setDoc(refPregunta, {
    texto: texto,
    fecha: new Date().toISOString()
  });

  input.value = "";
  alert("Pregunta agregada correctamente.");
};

onSnapshot(collection(db, "preguntas"), (snapshot) => {
  let html = "";

  snapshot.forEach(docSnap => {
    html += `<div class="item">${docSnap.data().texto}</div>`;
  });

  document.getElementById("listaPreguntas").innerHTML =
    html || "<p>Aún no hay preguntas registradas.</p>";
});
</script>

</body>
</html>
